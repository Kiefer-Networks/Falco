AutoName: Falco
Description: |-
    Falco is a privacy-respecting Android client for Hetzner Online services.

    From a single secure app you can manage:

    * Hetzner Cloud — list and control servers (power on/off, reboot,
      snapshot, rescue), volumes, networks, firewalls, floating IPs
      and load balancers.
    * Hetzner Robot — dedicated servers (reset, rescue, Wake-on-LAN),
      Storage Boxes (snapshots, sub-accounts, password reset),
      vSwitches and failover IPs.
    * Hetzner DNS Console — list zones, create and edit records,
      bulk import.
    * Hetzner Object Storage — browse buckets and objects,
      upload and download files, generate signed share links.

    Security highlights:

    * No tracking, no ads, no proprietary dependencies.
    * Credentials are stored in EncryptedSharedPreferences with the
      master key bound to the Android Keystore (StrongBox where
      available) and gated behind biometrics or device credentials.
    * TLS 1.3 only with certificate pinning for all four Hetzner APIs.
    * FLAG_SECURE prevents tokens from leaking through screenshots
      and the Recent-Apps switcher.
    * Auto-backup is disabled — secrets never leave the device.

    Falco is free software (GPL-3.0-or-later). Bug reports and
    contributions are welcome on the project's issue tracker.

