# Falco — Dependabot configuration
# SPDX-License-Identifier: GPL-3.0-or-later
#
# Two ecosystems:
#  - Gradle (transitive + direct app deps via libs.versions.toml).
#  - GitHub Actions (third-party Actions pinned by SHA in our workflows).
#
# Rebase strategy: auto so updates always apply on top of latest main.
# Open-PR ceiling: 5 per ecosystem so a wave of bumps doesn't drown the inbox.
#
# Auto-merge policy lives in `.github/workflows/auto-merge-dependabot.yml`:
# patch + minor go through with `--auto --squash` once required CI checks
# pass; major bumps stay manual because Falco's stack (AGP, Kotlin, AndroidX
# security, biometric, Compose BOM) regularly ships breaking changes inside a
# major.

version: 2

updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    rebase-strategy: auto
    labels:
      - dependencies
      - gradle
    commit-message:
      prefix: "build(deps)"
      include: scope
    # Group routine, low-risk updates so the inbox doesn't bloat. Major bumps
    # stay individual so they each get their own PR + CI signal.
    groups:
      androidx-non-major:
        applies-to: version-updates
        patterns:
          - "androidx.*"
          - "com.google.dagger:*"
        update-types:
          - "patch"
          - "minor"
      kotlin-non-major:
        applies-to: version-updates
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx:*"
          - "com.google.devtools.ksp*"
        update-types:
          - "patch"
          - "minor"
      compose-bom:
        applies-to: version-updates
        patterns:
          - "androidx.compose:compose-bom"
        update-types:
          - "patch"
          - "minor"
          - "major"
    # Ignore artefacts where breakage shows up in subtle places (R8 keep
    # rules, Tink keyset compat) — surface a single PR per major manually.
    ignore:
      # AGP majors require bespoke audit (R8 rule semantics); subscribe to
      # patch + minor only.
      - dependency-name: "com.android.application"
        update-types: ["version-update:semver-major"]
      # security-crypto is migration-only in v2.0; pinned at 1.1.0 until
      # v2.1 drops the dependency.
      - dependency-name: "androidx.security:security-crypto"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    rebase-strategy: auto
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci(actions)"
      include: scope
