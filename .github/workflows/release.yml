name: Release — Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Extract version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Lint
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

  build-android:
    name: Android (APK + AAB)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks

      - name: Create keystore properties
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > keystore.properties <<KP
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=keystore.jks
          KP

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Build AAB
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Rename artifacts
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/release/*.apk \
             "release-assets/Falco-${VERSION}.apk" 2>/dev/null || true
          find app/build/outputs/bundle -name "*.aab" -exec cp {} \
             "release-assets/Falco-${VERSION}.aab" \; 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release-assets/*.apk
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: release-assets/*.aab
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    needs: [preflight, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release assets
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          mkdir -p release-assets
          cp artifacts/android-apk/*.apk release-assets/ 2>/dev/null || true
          cp artifacts/android-aab/*.aab release-assets/ 2>/dev/null || true
          ls -lh release-assets/

      - name: Generate release notes
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          cat > release-notes.md <<NOTES
          ## Falco ${VERSION}

          Privacy-respecting Hetzner manager for Android.

          ### Downloads

          | Platform | File |
          |----------|------|
          | Android (APK) | \`Falco-${VERSION}.apk\` |
          | Android (AAB) | \`Falco-${VERSION}.aab\` |

          ---
          **License:** GPL-3.0-or-later · **Donate:** https://de.liberapay.com/beli3ver
          NOTES
          sed -i 's/^          //' release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Falco ${{ needs.preflight.outputs.version }}
          draft: false
          body_path: release-notes.md
          files: release-assets/*
