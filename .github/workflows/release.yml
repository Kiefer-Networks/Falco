name: Release — Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - id: version
        name: Extract version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Verify tag matches versionName
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TAG_VERSION="${REF#v}"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag '$REF' (parsed as '$TAG_VERSION') does not match app/build.gradle.kts versionName '$VERSION'"
            exit 1
          fi
          echo "Tag $REF matches versionName $VERSION"

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a  # v4

      - name: Lint (debug)
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Lint (release)
        run: ./gradlew :app:lintRelease --no-daemon

      - name: Unit tests (debug)
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Unit tests (release)
        run: ./gradlew :app:testReleaseUnitTest --no-daemon

  build-android:
    name: Android (APK + AAB)
    needs: preflight
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a  # v4

      - name: Verify signing secrets present
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "::error::KEYSTORE_BASE64 secret missing — refusing to publish unsigned APK"
            exit 1
          fi

      - name: Set up signing materials
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          set -euo pipefail
          # Locked-down umask so any file the heredoc creates is owner-only,
          # even if the runner ever shares the work tree with another step.
          umask 077
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks
          cat > keystore.properties <<KP
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=keystore.jks
          KP
          chmod 600 app/keystore.jks keystore.properties

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Build AAB
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Rename artifacts
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/release/*.apk \
             "release-assets/Falco-${VERSION}.apk" 2>/dev/null || true
          find app/build/outputs/bundle -name "*.aab" -exec cp {} \
             "release-assets/Falco-${VERSION}.aab" \; 2>/dev/null || true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: android-apk
          path: release-assets/*.apk
          if-no-files-found: ignore

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: android-aab
          path: release-assets/*.aab
          if-no-files-found: ignore

      - name: Cleanup signing materials
        if: ${{ always() }}
        run: rm -f keystore.properties app/keystore.jks

  release:
    name: Create GitHub Release
    needs: [preflight, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: android-apk
          path: artifacts/android-apk/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: android-aab
          path: artifacts/android-aab/

      - name: Collect release assets
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp "artifacts/android-apk/Falco-${VERSION}.apk" release-assets/
          cp "artifacts/android-aab/Falco-${VERSION}.aab" release-assets/
          ls -lh release-assets/

      - name: Generate release notes
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          cat > release-notes.md <<NOTES
          ## Falco ${VERSION}

          Privacy-respecting Hetzner manager for Android.

          ### Downloads

          | Platform | File |
          |----------|------|
          | Android (APK) | \`Falco-${VERSION}.apk\` |
          | Android (AAB) | \`Falco-${VERSION}.aab\` |

          ---
          **License:** GPL-3.0-or-later · **Donate:** https://de.liberapay.com/beli3ver
          NOTES
          sed -i 's/^          //' release-notes.md

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Falco ${{ needs.preflight.outputs.version }}
          draft: false
          body_path: release-notes.md
          files: |
            release-assets/Falco-*.apk
            release-assets/Falco-*.aab
