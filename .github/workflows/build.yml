name: Build

# This workflow only runs first-party gradle commands. It does NOT consume any
# attacker-controlled context such as PR titles, issue bodies or commit
# messages, so command injection isn't a concern here.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Lint
        run: ./gradlew :app:lintRelease --no-daemon --stacktrace

      - name: Unit tests
        run: ./gradlew :app:testReleaseUnitTest --no-daemon --stacktrace

      - name: Build unsigned release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Verify reproducibility
        run: |
          ./gradlew clean :app:assembleRelease --no-daemon --no-build-cache
          mv app/build/outputs/apk/release/app-release-unsigned.apk first.apk
          ./gradlew clean :app:assembleRelease --no-daemon --no-build-cache
          mv app/build/outputs/apk/release/app-release-unsigned.apk second.apk
          if ! diff -q first.apk second.apk; then
            echo "::warning::APKs differ between builds — reproducibility failed."
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14
